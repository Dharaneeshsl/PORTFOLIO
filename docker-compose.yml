version: "3.8"

services:
  server:
    build: ./server
    container_name: portfolio-server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
    env_file:
      - ./server/.env
    restart: always
    networks:
      - portfolio-network

  client:
    build: ./client
    container_name: portfolio-client
    ports:
      - "3000:3000"
    depends_on:
      - server
    restart: always
    networks:
      - portfolio-network

networks:
  portfolio-network:
    driver: bridge
